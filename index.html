<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05080a" />
    <meta
      name="description"
      content="Yoova — a social discovery platform where every connection starts at a real event. Launching in Rome." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" />
    <!-- Warm the browser cache for the 3D pin in parallel with JS parsing.
         Keep the href in sync with MODEL_URL in src/three/YoovaPin.tsx. -->
    <link
      rel="preload"
      as="fetch"
      type="model/gltf-binary"
      crossorigin="anonymous"
      href="/yoova-pin.glb" />
    <title>Yoova — Where people meet through moments, not swipes</title>
  </head>
  <body class="bg-ink-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Apple-style liquid glass distortion filter (lucasromerodb).
         Referenced by .liquid-glass-apple__effect via `filter: url(#glass-distortion)`.
         On Safari/Firefox this filter reference won't render — those browsers
         will still show the backdrop blur + tint + shine (just without ripple). -->
    <svg
      aria-hidden="true"
      focusable="false"
      style="position: absolute; width: 0; height: 0; overflow: hidden">
      <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
        <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01" numOctaves="1" seed="5" result="turbulence" />
        <feComponentTransfer in="turbulence" result="mapped">
          <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5" />
          <feFuncG type="gamma" amplitude="0" exponent="1" offset="0" />
          <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5" />
        </feComponentTransfer>
        <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap" />
        <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight">
          <fePointLight x="-200" y="-200" z="300" />
        </feSpecularLighting>
        <feComposite in="specLight" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litImage" />
        <feDisplacementMap in="SourceGraphic" in2="softMap" scale="80" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>
  </body>
</html>
